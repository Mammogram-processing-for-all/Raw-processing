site_name: Mammogram Processing for All
site_url: https://mammogram-processing-for-all.github.io/Raw-processing/
site_author: Mammogram Processing for All
site_description: Documentation for the Mammogram Processing for All project.

# Repository
repo_name: Mammogram-processing-for-all/Raw-processing
repo_url: https://github.com/Mammogram-processing-for-all/Raw-processing

# Configuration
theme:
  name: material
  features:
    - navigation.footer
    - content.footnote.tooltips

  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/link
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/toggle-switch
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/toggle-switch-off
        name: Switch to system preference
  font:
    text: Roboto
    code: Roboto Mono
  # favicon: assets/favicon.png
  icon:
    logo: logo
  # logo: assets/logo.png # You can use a custom logo by placing it in the `assets` directory and referencing it here.

# Extensions
markdown_extensions:
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.blocks.caption
  - admonition
  - pymdownx.details
  - tables
  - footnotes
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

# Page tree
nav:
  - 홈: index.md
  - 기초:
      - 맘모그램의 개념: foundations/mammography.md
      - 장비의 기본 구조: foundations/system.md
      - X-ray의 성질과 감쇠: foundations/xray-physics.md
      - 디지털 디텍터와 비선형성: foundations/detector.md
  - 영상 형성과 톤 매핑:
      - 처리 파이프라인 개요: image-formation/pipeline-overview.md
      - 특성 곡선과 톤 매핑: image-formation/characteristic-curves.md
      - Windowing / WW·WL / Flatten: image-formation/windowing.md
  - 영상 품질 지표:
      - MTF·NPS·DQE·CNR: image-quality/metrics.md
  - 처리 기법:
      - 기법 개요와 분류: techniques/index.md
      - LUT (Look-Up Table): techniques/lut.md
      - 점 연산 (Windowing·Gamma·CLAHE): techniques/point-operations.md
      - Smoothing과 Denoising: techniques/smoothing.md
      - Sharpening과 Edge Enhancement: techniques/sharpening.md
      - Contrast Enhancement: techniques/contrast-enhancement.md
      - 다중스케일 분해와 변환영역: techniques/multiscale.md
      - Peripheral Equalization과 두께 보상: techniques/peripheral-equalization.md
      - 최신 동향 (딥러닝): techniques/modern-dl.md
  - 사례 연구:
      - 3-Tier 향상 파이프라인: pipeline/three-tier.md
  - Personal research:
      - dukju_baseline: dukju_baseline.md
      - dukju_gemma_skin: dukju_gemma_skin.md
  - 참고문헌: references.md
  - 부록 - Markdown 작성 가이드: examples.md

